<3D 甩狙模拟器>
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🔭 3D 甩狙模拟器 · 触控版</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #0a0f1a;
            touch-action: none;  /* 禁止默认手势 */
        }
        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* 让触摸穿透到canvas，但按钮区域需要允许事件 */
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
        }
        .stats-panel {
            background: rgba(10, 20, 30, 0.75);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 48px;
            border: 1px solid #3a5f7a;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            color: white;
            display: flex;
            gap: 30px;
            pointer-events: auto;
        }
        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            text-shadow: 0 2px 5px black;
        }
        .stat span {
            color: #ffd966;
            font-size: 26px;
            font-weight: 800;
            min-width: 50px;
            text-align: right;
        }
        .scope-indicator {
            background: rgba(10, 20, 30, 0.75);
            backdrop-filter: blur(8px);
            padding: 10px 24px;
            border-radius: 48px;
            border: 1px solid #3a5f7a;
            display: flex;
            align-items: center;
            gap: 12px;
            pointer-events: auto;
            color: white;
        }
        .led {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #4e5f6e;
            box-shadow: 0 0 8px black;
            transition: 0.1s;
        }
        .led.active {
            background: #3eff9e;
            box-shadow: 0 0 20px #1eff8e;
        }
        #swing-feedback {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: 900;
            color: #ffd966;
            text-shadow: 0 0 30px #ff9900, 0 0 10px red;
            text-transform: uppercase;
            letter-spacing: 8px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            white-space: nowrap;
            z-index: 20;
        }
        #velocity-bar-container {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 200px;
            height: 18px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            border: 1px solid #3e6a97;
            overflow: hidden;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }
        #velocity-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3ea0ff, #ffaa33);
            border-radius: 20px;
            transition: width 0.05s;
        }
        .control-hint {
            position: absolute;
            bottom: 30px;
            left: 30px;
            color: #b0c7e0;
            background: rgba(0,0,0,0.4);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 14px;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
        #reset-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e3a5f;
            color: white;
            border: 1px solid #5f9fcf;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            backdrop-filter: blur(8px);
            pointer-events: auto;
            cursor: pointer;
            box-shadow: 0 4px 15px black;
            font-size: 16px;
            z-index: 15;
        }
        #language-selector {
            position: absolute;
            top: 20px;
            right: 20px;
            pointer-events: auto;
            z-index: 30;
        }
        #lang-btn {
            background: rgba(20,35,50,0.8);
            backdrop-filter: blur(8px);
            border: 1px solid #6a9ac0;
            color: white;
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }
        /* 开始前UI (语言选择覆盖层) */
        #startup-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 30% 30%, #132433, #050a12);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: auto;
            transition: opacity 0.5s;
            color: white;
        }
        .startup-title {
            font-size: 56px;
            font-weight: 900;
            text-shadow: 0 0 30px #3a8cff;
            margin-bottom: 20px;
            letter-spacing: 6px;
        }
        .lang-buttons {
            display: flex;
            gap: 40px;
            margin-top: 50px;
        }
        .lang-btn {
            background: #1e3a5f;
            border: 2px solid #7ab3e0;
            color: white;
            font-size: 32px;
            font-weight: bold;
            padding: 20px 50px;
            border-radius: 80px;
            cursor: pointer;
            box-shadow: 0 10px 20px black;
            transition: 0.2s;
            min-width: 200px;
        }
        .lang-btn:hover {
            background: #2b5580;
            transform: scale(1.05);
        }
        .startup-footer {
            margin-top: 60px;
            color: #9bb7d4;
        }
        /* 准星 (CSS绘制) */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 6px;
            background: rgba(255, 100, 100, 0.9);
            border-radius: 50%;
            box-shadow: 0 0 20px red;
            pointer-events: none;
            z-index: 10;
            border: 1px solid white;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.9);
        }
        #crosshair::before {
            width: 2px; height: 22px; left: 2px; top: -26px;
            box-shadow: 0 0 8px cyan;
        }
        #crosshair::after {
            width: 22px; height: 2px; left: -26px; top: 2px;
            box-shadow: 0 0 8px cyan;
        }
        /* 开镜时的镜框效果 */
        #scope-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.15s;
            border-radius: 50%;
            box-shadow: inset 0 0 0 2000px rgba(0,0,0,0.75), 0 0 0 4px #2a4a6a, 0 0 30px black;
            border: 2px solid #7aa5c0;
            backdrop-filter: blur(1px);
        }
        .scope-active #scope-overlay {
            opacity: 1;
        }
        .scope-active #crosshair::before,
        .scope-active #crosshair::after {
            background: #aad0ff;
            box-shadow: 0 0 12px #3eff9e;
        }
    </style>
</head>
<body>
<div id="game-container">
    <canvas id="three-canvas" style="display: block; width: 100%; height: 100%; touch-action: none;"></canvas>
    
    <!-- 开始前语言选择界面 -->
    <div id="startup-overlay">
        <div class="startup-title" data-lang-en="🔭 SWING SNIPER" data-lang-zh="🔭 甩狙模拟器">🔭 甩狙模拟器</div>
        <div class="lang-buttons">
            <button class="lang-btn" data-lang="zh">🇨🇳 中文</button>
            <button class="lang-btn" data-lang="en">🇬🇧 English</button>
        </div>
        <div class="startup-footer" data-lang-en="Hold to aim · Release to fire · Swipe fast for swing bonus" data-lang-zh="按住瞄准 · 松手射击 · 快速滑动触发甩狙">按住瞄准 · 松手射击 · 快速滑动触发甩狙</div>
    </div>

    <div id="ui-layer">
        <div id="hud">
            <div class="stats-panel">
                <div class="stat"><span data-lang-en="🎯 HITS" data-lang-zh="🎯 命中">🎯 命中</span> <span id="hit-count">0</span></div>
                <div class="stat"><span data-lang-en="⚡ SWING" data-lang-zh="⚡ 甩狙">⚡ 甩狙</span> <span id="swing-count">0</span></div>

            <div class="scope-indicator">
                <div class="led" id="scope-led"></div>
                <span data-lang-en="🔭 SCOPE" data-lang-zh="🔭 开镜">🔭 开镜</span>

            <div id="velocity-fill"></div>

        <button id="reset-btn" data-lang-en="🔄 Reset Range" data-lang-zh="🔄 重置靶场">🔄 重置靶场</button>
        <div id="language-selector">
            <button id="lang-btn" data-lang-en="🌐 中文" data-lang-zh="🌐 English">🌐 English</button>
        </div>
        <div id="crosshair"></div>
        <div id="scope-overlay"></div>
    </div>
</div>

<!-- 使用 Three.js -->
<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';

    // --- 初始化场景 ---
    const canvasEl = document.getElementById('three-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas: canvasEl, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0c1420);
    scene.fog = new THREE.FogExp2(0x0c1420, 0.012);

    // 相机 (第一人称狙击位)
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2.8, 9);
    camera.lookAt(0, 1.5, 0);
    
    // 基础光照
    const ambientLight = new THREE.AmbientLight(0x404060);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
    dirLight.position.set(5, 12, 8);
    dirLight.castShadow = true;
    dirLight.receiveShadow = true;
    dirLight.shadow.mapSize.width = 1024;
    dirLight.shadow.mapSize.height = 1024;
    const d = 15;
    dirLight.shadow.camera.left = -d;
    dirLight.shadow.camera.right = d;
    dirLight.shadow.camera.top = d;
    dirLight.shadow.camera.bottom = -d;
    dirLight.shadow.camera.near = 1;
    dirLight.shadow.camera.far = 30;
    dirLight.shadow.bias = -0.001;
    scene.add(dirLight);
    
    const fillLight = new THREE.PointLight(0x446688, 0.8);
    fillLight.position.set(-3, 5, 5);
    scene.add(fillLight);
    
    // 地面网格 + 平台
    const gridHelper = new THREE.GridHelper(30, 20, 0x88aacc, 0x334455);
    gridHelper.position.y = 0.01;
    scene.add(gridHelper);
    
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a2a3a, roughness: 0.7, metalness: 0.1 });
    const groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), groundMat);
    groundPlane.rotation.x = -Math.PI / 2;
    groundPlane.position.y = 0;
    groundPlane.receiveShadow = true;
    scene.add(groundPlane);

    // 装饰柱子
    const pillarGeo = new THREE.CylinderGeometry(0.3, 0.4, 2);
    const pillarMat = new THREE.MeshStandardMaterial({ color: 0x5a6a7a, roughness: 0.8 });
    for (let i = -3; i <= 3; i+=6) {
        for (let j = -3; j <= 3; j+=6) {
            const pillar = new THREE.Mesh(pillarGeo, pillarMat);
            pillar.position.set(i, 1, j-2);
            pillar.receiveShadow = true;
            pillar.castShadow = true;
            scene.add(pillar);
        }
    }

    // --- 靶子数组 ---
    const targets = [];
    const TARGET_COUNT = 10;
    
    function createTarget() {
        const group = new THREE.Group();
        
        // 底座
        const base = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.8, 0.2), new THREE.MeshStandardMaterial({ color: 0x8a6e4b, roughness: 0.7 }));
        base.position.y = 0.1;
        base.receiveShadow = true;
        base.castShadow = true;
        group.add(base);
        
        // 支柱
        const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 1.2), new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.5, metalness: 0.3 }));
        pole.position.y = 0.8;
        pole.receiveShadow = true;
        pole.castShadow = true;
        group.add(pole);
        
        // 靶板 (圆环+圆盘)
        const boardMat = new THREE.MeshStandardMaterial({ color: 0xcc3333, roughness: 0.4 });
        const board = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 0.9, 0.08), boardMat);
        board.position.y = 1.45;
        board.receiveShadow = true;
        board.castShadow = true;
        group.add(board);
        
        // 白色环
        const whiteRing = new THREE.Mesh(new THREE.TorusGeometry(0.65, 0.06, 16, 32), new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.3 }));
        whiteRing.rotation.x = Math.PI / 2;
        whiteRing.position.y = 1.5;
        whiteRing.receiveShadow = true;
        group.add(whiteRing);
        
        // 内环
        const innerRing = new THREE.Mesh(new THREE.TorusGeometry(0.4, 0.06, 16, 32), new THREE.MeshStandardMaterial({ color: 0xdd4444 }));
        innerRing.rotation.x = Math.PI / 2;
        innerRing.position.y = 1.52;
        group.add(innerRing);
        
        // 中心
        const centerDot = new THREE.Mesh(new THREE.SphereGeometry(0.18, 16), new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: new THREE.Color(0x442200) }));
        centerDot.position.y = 1.55;
        group.add(centerDot);
        
        return group;
    }

    function respawnTarget(index) {
        const t = targets[index];
        const angle = (index / TARGET_COUNT) * Math.PI * 2 + 0.5;
        const radius = 5.5 + Math.random() * 2.5;
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius - 1;
        t.group.position.set(x, 0, z);
        t.group.rotation.y = Math.atan2(-x, -z);
        t.alive = true;
    }

    // 初始化靶子
    for (let i = 0; i < TARGET_COUNT; i++) {
        const group = createTarget();
        scene.add(group);
        targets.push({
            group: group,
            alive: true,
            mesh: group // 用于射线检测
        });
        respawnTarget(i);
    }

    // --- 游戏状态 ---
    let hitScore = 0;
    let swingScore = 0;
    let isAiming = false;        // 按住瞄准 (开镜)
    const NORMAL_FOV = 60;
    const SCOPE_FOV = 25;
    
    // 触控/鼠标 速度计算
    let lastTouchX = 0, lastTouchY = 0;
    let touchVelocity = 0;
    const SWING_THRESHOLD = 12.0;
    
    // UI元素
    const hitSpan = document.getElementById('hit-count');
    const swingSpan = document.getElementById('swing-count');
    const scopeLed = document.getElementById('scope-led');
    const swingFeedback = document.getElementById('swing-feedback');
    const velocityFill = document.getElementById('velocity-fill');
    const scopeOverlay = document.getElementById('scope-overlay');
    const uiLayer = document.getElementById('ui-layer');
    
    // 语言相关
    let currentLang = 'zh';
    const langElements = document.querySelectorAll('[data-lang-en]');
    const startupOverlay = document.getElementById('startup-overlay');
    const langBtns = document.querySelectorAll('.lang-btn');
    const langToggleBtn = document.getElementById('lang-btn');
    
    function setLanguage(lang) {
        currentLang = lang;
        langElements.forEach(el => {
            const text = el.getAttribute(`data-lang-${lang}`) || el.getAttribute(`data-lang-en`);
            if (text) el.textContent = text;
        });
        // 更新启动界面文字
        document.querySelector('.startup-title').textContent = lang === 'zh' ? '🔭 甩狙模拟器' : '🔭 SWING SNIPER';
        document.querySelector('.startup-footer').textContent = lang === 'zh' ? '按住瞄准 · 松手射击 · 快速滑动触发甩狙' : 'Hold to aim · Release to fire · Swipe fast for swing bonus';
        langToggleBtn.textContent = lang === 'zh' ? '🌐 English' : '🌐 中文';
    }
    
    langBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const lang = btn.getAttribute('data-lang');
            setLanguage(lang);
            startupOverlay.style.opacity = '0';
            setTimeout(() => {
                startupOverlay.style.display = 'none';
            }, 500);
        });
    });
    
    langToggleBtn.addEventListener('click', () => {
        setLanguage(currentLang === 'zh' ? 'en' : 'zh');
    });
    
    function updateUI() {
        hitSpan.textContent = hitScore;
        swingSpan.textContent = swingScore;
    }
    
    function showSwingEffect() {
        swingFeedback.style.opacity = '1';
        setTimeout(() => swingFeedback.style.opacity = '0', 300);
    }
    
    // 射击逻辑 (射线检测)
    function shoot() {
        if (!isAiming) return; // 只有瞄准时才能射击
        
        const raycaster = new THREE.Raycaster();
        const direction = new THREE.Vector3(0, 0, -1);
        direction.applyQuaternion(camera.quaternion);
        raycaster.set(camera.position, direction);
        
        // 计算甩狙半径加成
        const velocityFactor = Math.min(touchVelocity / 20, 2.0);
        const swingBonus = touchVelocity > SWING_THRESHOLD ? 0.6 + velocityFactor * 0.9 : 0;
        const baseRadius = isAiming ? 0.55 : 0.9;
        const hitRadius = baseRadius + swingBonus;
        
        let hitAny = false;
        let swingOccurred = false;
        const isSwing = touchVelocity > SWING_THRESHOLD;
        
        targets.forEach((t, idx) => {
            if (!t.alive) return;
            
            // 简单检测：用包围球距离
            const targetPos = t.group.position.clone();
            targetPos.y += 1.5; // 靶心高度
            
            const rayOrigin = camera.position;
            const rayDir = direction;
            
            // 计算射线到球心的距离
            const toTarget = new THREE.Vector3().subVectors(targetPos, rayOrigin);
            const proj = toTarget.dot(rayDir);
            if (proj < 0) return;
            
            const closestPoint = new THREE.Vector3().copy(rayDir).multiplyScalar(proj).add(rayOrigin);
            const distToCenter = closestPoint.distanceTo(targetPos);
            
            if (distToCenter < hitRadius) {
                t.alive = false;
                hitAny = true;
                hitScore++;
                if (isSwing) {
                    swingScore++;
                    swingOccurred = true;
                }
                respawnTarget(idx);
            }
        });
        
        if (hitAny) {
            updateUI();
            if (swingOccurred) showSwingEffect();
        }
    }
    
    // --- 触控/鼠标 瞄准逻辑 (按住开镜，移动旋转视角，松手射击) ---
    function startAim(clientX, clientY) {
        isAiming = true;
        camera.fov = SCOPE_FOV;
        camera.updateProjectionMatrix();
        scopeLed.classList.add('active');
        uiLayer.classList.add('scope-active');
        
        lastTouchX = clientX;
        lastTouchY = clientY;
        touchVelocity = 0;
    }
    
    function endAim() {
        if (isAiming) {
            shoot(); // 松手射击
        }
        isAiming = false;
        camera.fov = NORMAL_FOV;
        camera.updateProjectionMatrix();
        scopeLed.classList.remove('active');
        uiLayer.classList.remove('scope-active');
        touchVelocity = 0;
        velocityFill.style.width = '0%';
    }
    
    function handleMove(clientX, clientY) {
        if (!isAiming) return;
        
        const deltaX = clientX - lastTouchX;
        const deltaY = clientY - lastTouchY;
        
        // 计算速度
        const dist = Math.sqrt(deltaX*deltaX + deltaY*deltaY);
        touchVelocity = touchVelocity * 0.7 + dist * 0.3;
        
        // 旋转相机 (类似FPS)
        const rotSpeed = 0.005;
        camera.rotation.y -= deltaX * rotSpeed;
        camera.rotation.x -= deltaY * rotSpeed;
        camera.rotation.x = Math.max(-0.9, Math.min(0.6, camera.rotation.x));
        
        lastTouchX = clientX;
        lastTouchY = clientY;
        
        // 更新速度条
        const percent = Math.min(touchVelocity / 25, 1.0) * 100;
        velocityFill.style.width = percent + '%';
    }
    
    // --- 事件绑定 (触控+鼠标) ---
    function onPointerDown(e) {
        e.preventDefault();
        const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        startAim(clientX, clientY);
    }
    
    function onPointerMove(e) {
        e.preventDefault();
        const clientX = e.clientX || (e.touches ? e.touches[0].clientX : lastTouchX);
        const clientY = e.clientY || (e.touches ? e.touches[0].clientY : lastTouchY);
        handleMove(clientX, clientY);
    }
    
    function onPointerUp(e) {
        e.preventDefault();
        endAim();
    }
    
    function onPointerCancel(e) {
        e.preventDefault();
        endAim();
    }
    
    // 重置靶场
    function resetRange() {
        hitScore = 0;
        swingScore = 0;
        updateUI();
        targets.forEach((t, i) => {
            t.alive = true;
            respawnTarget(i);
        });
    }
    
    // 绑定事件
    canvasEl.addEventListener('touchstart', onPointerDown, { passive: false });
    canvasEl.addEventListener('touchmove', onPointerMove, { passive: false });
    canvasEl.addEventListener('touchend', onPointerUp);
    canvasEl.addEventListener('touchcancel', onPointerCancel);
    
    canvasEl.addEventListener('mousedown', onPointerDown);
    window.addEventListener('mousemove', (e) => {
        if (isAiming) {
            e.preventDefault();
            handleMove(e.clientX, e.clientY);
        }
    });
    window.addEventListener('mouseup', onPointerUp);
    
    document.getElementById('reset-btn').addEventListener('click', resetRange);
    
    // 防止右键菜单
    canvasEl.addEventListener('contextmenu', e => e.preventDefault());
    
    // 窗口自适应
    window.addEventListener('resize', onWindowResize, false);
    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }
    
    // 添加一些漂浮粒子特效 (可选)
    const starsGeometry = new THREE.BufferGeometry();
    const starsCount = 600;
    const starPositions = new Float32Array(starsCount * 3);
    for (let i = 0; i < starsCount * 3; i+=3) {
        starPositions[i] = (Math.random() - 0.5) * 200;
        starPositions[i+1] = (Math.random() - 0.5) * 100;
        starPositions[i+2] = (Math.random() - 0.5) * 200;
    }
    starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    const starsMaterial = new THREE.PointsMaterial({color: 0xaaccff, size: 0.15});
    const stars = new THREE.Points(starsGeometry, starsMaterial);
    scene.add(stars);
    
    // --- 动画循环 ---
    function animate() {
        requestAnimationFrame(animate);
        
        // 轻微浮动星星
        stars.rotation.y += 0.0002;
        
        renderer.render(scene, camera);
    }
    
    animate();
    
    // 初始语言设为中文，但显示选择界面
    setLanguage('zh');
    
    // 处理启动界面显示
    // 已经默认显示，点击语言后隐藏
    
    console.log('🎯 3D 甩狙模拟器 · 触控模式已启动');
</script>
</body>
</html>
