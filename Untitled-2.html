<3D Swing Sniper></3D>
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🔭 3D 甩狙模拟器 · 立靶 · 积分榜</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #0a0f1a;
            touch-action: none;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
        }
        .stats-panel {
            background: rgba(10, 20, 30, 0.75);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 48px;
            border: 1px solid #3a5f7a;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            color: white;
            display: flex;
            gap: 30px;
            pointer-events: auto;
        }
        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            text-shadow: 0 2px 5px black;
        }
        .stat span {
            color: #ffd966;
            font-size: 26px;
            font-weight: 800;
            min-width: 50px;
            text-align: right;
        }
        .scope-indicator {
            background: rgba(10, 20, 30, 0.75);
            backdrop-filter: blur(8px);
            padding: 10px 24px;
            border-radius: 48px;
            border: 1px solid #3a5f7a;
            display: flex;
            align-items: center;
            gap: 12px;
            pointer-events: auto;
            color: white;
        }
        .led {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #4e5f6e;
            box-shadow: 0 0 8px black;
            transition: 0.1s;
        }
        .led.active {
            background: #3eff9e;
            box-shadow: 0 0 20px #1eff8e;
        }
        #swing-feedback {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: 900;
            color: #ffd966;
            text-shadow: 0 0 30px #ff9900, 0 0 10px red;
            text-transform: uppercase;
            letter-spacing: 8px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            white-space: nowrap;
            z-index: 20;
        }
        #velocity-bar-container {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 200px;
            height: 18px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            border: 1px solid #3e6a97;
            overflow: hidden;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }
        #velocity-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3ea0ff, #ffaa33);
            border-radius: 20px;
            transition: width 0.05s;
        }
        .control-hint {
            position: absolute;
            bottom: 30px;
            left: 30px;
            color: #b0c7e0;
            background: rgba(0,0,0,0.4);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 14px;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
        #reset-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e3a5f;
            color: white;
            border: 1px solid #5f9fcf;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            backdrop-filter: blur(8px);
            pointer-events: auto;
            cursor: pointer;
            box-shadow: 0 4px 15px black;
            font-size: 16px;
            z-index: 15;
        }
        /* 右上角工具栏 */
        #top-right-tools {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 12px;
            pointer-events: auto;
            z-index: 30;
        }
        #lang-btn, #leaderboard-toggle {
            background: rgba(20,35,50,0.8);
            backdrop-filter: blur(8px);
            border: 1px solid #6a9ac0;
            color: white;
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
        /* 积分榜面板 */
        #leaderboard-panel {
            position: absolute;
            top: 80px;
            right: 20px;
            width: 260px;
            background: rgba(8, 18, 28, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid #4a7a9c;
            border-radius: 24px;
            padding: 18px 12px;
            color: white;
            box-shadow: 0 10px 30px black;
            pointer-events: auto;
            z-index: 40;
            display: none;
            transition: opacity 0.2s;
        }
        #leaderboard-panel.show {
            display: block;
        }
        .leaderboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-weight: 700;
            font-size: 20px;
            border-bottom: 1px solid #3a6a8a;
            padding-bottom: 8px;
        }
        .leaderboard-header span {
            color: #ffd966;
        }
        .close-btn {
            background: none;
            border: none;
            color: #aaccdd;
            font-size: 24px;
            cursor: pointer;
            padding: 0 8px;
        }
        #leaderboard-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 6px;
            border-bottom: 1px solid #2a4a5a;
            font-size: 18px;
        }
        .leaderboard-item .rank {
            color: #ffbb33;
            font-weight: bold;
            width: 30px;
        }
        .leaderboard-item .score {
            color: #8ecae6;
            font-weight: 700;
        }
        .empty-leaderboard {
            text-align: center;
            color: #8899aa;
            padding: 20px 0;
        }
        .leaderboard-footer {
            margin-top: 16px;
            display: flex;
            justify-content: space-around;
        }
        .leaderboard-footer button {
            background: #1e3a5f;
            border: 1px solid #5f9fcf;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }
        #startup-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 30% 30%, #132433, #050a12);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: auto;
            transition: opacity 0.5s;
            color: white;
        }
        .startup-title {
            font-size: 56px;
            font-weight: 900;
            text-shadow: 0 0 30px #3a8cff;
            margin-bottom: 20px;
            letter-spacing: 6px;
        }
        .lang-buttons {
            display: flex;
            gap: 40px;
            margin-top: 50px;
        }
        .lang-btn {
            background: #1e3a5f;
            border: 2px solid #7ab3e0;
            color: white;
            font-size: 32px;
            font-weight: bold;
            padding: 20px 50px;
            border-radius: 80px;
            cursor: pointer;
            box-shadow: 0 10px 20px black;
            transition: 0.2s;
            min-width: 200px;
        }
        .lang-btn:hover {
            background: #2b5580;
            transform: scale(1.05);
        }
        .startup-footer {
            margin-top: 60px;
            color: #9bb7d4;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 6px;
            background: rgba(255, 100, 100, 0.9);
            border-radius: 50%;
            box-shadow: 0 0 20px red;
            pointer-events: none;
            z-index: 10;
            border: 1px solid white;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.9);
        }
        #crosshair::before {
            width: 2px; height: 22px; left: 2px; top: -26px;
            box-shadow: 0 0 8px cyan;
        }
        #crosshair::after {
            width: 22px; height: 2px; left: -26px; top: 2px;
            box-shadow: 0 0 8px cyan;
        }
        #scope-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.15s;
            border-radius: 50%;
            box-shadow: inset 0 0 0 2000px rgba(0,0,0,0.75), 0 0 0 4px #2a4a6a, 0 0 30px black;
            border: 2px solid #7aa5c0;
            backdrop-filter: blur(1px);
        }
        .scope-active #scope-overlay {
            opacity: 1;
        }
        .scope-active #crosshair::before,
        .scope-active #crosshair::after {
            background: #aad0ff;
            box-shadow: 0 0 12px #3eff9e;
        }
    </style>
</head>
<body>
<div id="game-container">
    <canvas id="three-canvas" style="display: block; width: 100%; height: 100%; touch-action: none;"></canvas>
    
    <div id="startup-overlay">
        <div class="startup-title" data-lang-en="🔭 SWING SNIPER" data-lang-zh="🔭 甩狙模拟器">🔭 甩狙模拟器</div>
        <div class="lang-buttons">
            <button class="lang-btn" data-lang="zh">🇨🇳 中文</button>
            <button class="lang-btn" data-lang="en">🇬🇧 English</button>
        </div>
        <div class="startup-footer" data-lang-en="Hold to aim · Release to fire · Swipe fast for swing bonus" data-lang-zh="按住瞄准 · 松手射击 · 快速滑动触发甩狙">按住瞄准 · 松手射击 · 快速滑动触发甩狙</div>
    </div>

    <div id="ui-layer">
        <div id="hud">
            <div class="stats-panel">
                <div class="stat"><span data-lang-en="🎯 HITS" data-lang-zh="🎯 命中">🎯 命中</span> <span id="hit-count">0</span></div>
                <div class="stat"><span data-lang-en="⚡ SWING" data-lang-zh="⚡ 甩狙">⚡ 甩狙</span> <span id="swing-count">0</span></div>
            </div>
            <div class="scope-indicator">
                <div class="led" id="scope-led"></div>
                <span data-lang-en="🔭 SCOPE" data-lang-zh="🔭 开镜">🔭 开镜</span>
            </div>
        </div>
        <div id="swing-feedback" data-lang-en="💥 SWING SHOT! 💥" data-lang-zh="💥 甩狙命中! 💥">💥 甩狙命中! 💥</div>
        <div id="velocity-bar-container">
            <div id="velocity-fill"></div>
        </div>
        <div class="control-hint" data-lang-en="👆 Hold screen to aim · Release to shoot · Swipe fast" data-lang-zh="👆 按住屏幕瞄准 · 松手射击 · 快速滑动甩狙">👆 按住屏幕瞄准 · 松手射击 · 快速滑动甩狙</div>
        <button id="reset-btn" data-lang-en="🔄 Reset Range" data-lang-zh="🔄 重置靶场">🔄 重置靶场</button>
        
        <div id="top-right-tools">
            <button id="lang-btn" data-lang-en="🌐 中文" data-lang-zh="🌐 English">🌐 English</button>
            <button id="leaderboard-toggle" data-lang-en="🏆 Leaderboard" data-lang-zh="🏆 积分榜">🏆 积分榜</button>
        </div>

        <!-- 积分榜面板 -->
        <div id="leaderboard-panel">
            <div class="leaderboard-header">
                <span data-lang-en="🏆 SWING RANK" data-lang-zh="🏆 甩狙榜">🏆 甩狙榜</span>
                <button class="close-btn" id="close-leaderboard">✕</button>
            </div>
            <ul id="leaderboard-list">
                <li class="empty-leaderboard" data-lang-en="No records yet" data-lang-zh="暂无记录">暂无记录</li>
            </ul>
            <div class="leaderboard-footer">
                <button id="clear-leaderboard" data-lang-en="Clear" data-lang-zh="清空">清空</button>
            </div>
        </div>

        <div id="crosshair"></div>
        <div id="scope-overlay"></div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';

    // --- 初始化场景 ---
    const canvasEl = document.getElementById('three-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas: canvasEl, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0c1420);
    scene.fog = new THREE.FogExp2(0x0c1420, 0.012);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2.8, 9);
    camera.lookAt(0, 1.5, 0);
    
    // 光照
    const ambientLight = new THREE.AmbientLight(0x404060);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
    dirLight.position.set(5, 12, 8);
    dirLight.castShadow = true;
    dirLight.receiveShadow = true;
    dirLight.shadow.mapSize.width = 1024;
    dirLight.shadow.mapSize.height = 1024;
    const d = 15;
    dirLight.shadow.camera.left = -d;
    dirLight.shadow.camera.right = d;
    dirLight.shadow.camera.top = d;
    dirLight.shadow.camera.bottom = -d;
    dirLight.shadow.camera.near = 1;
    dirLight.shadow.camera.far = 30;
    scene.add(dirLight);
    
    const fillLight = new THREE.PointLight(0x446688, 0.8);
    fillLight.position.set(-3, 5, 5);
    scene.add(fillLight);
    
    // 地面
    const gridHelper = new THREE.GridHelper(30, 20, 0x88aacc, 0x334455);
    gridHelper.position.y = 0.01;
    scene.add(gridHelper);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a2a3a, roughness: 0.7 });
    const groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), groundMat);
    groundPlane.rotation.x = -Math.PI / 2;
    groundPlane.position.y = 0;
    groundPlane.receiveShadow = true;
    scene.add(groundPlane);

    // 装饰柱
    const pillarGeo = new THREE.CylinderGeometry(0.3, 0.4, 2);
    const pillarMat = new THREE.MeshStandardMaterial({ color: 0x5a6a7a, roughness: 0.8 });
    for (let i = -3; i <= 3; i+=6) {
        for (let j = -3; j <= 3; j+=6) {
            const pillar = new THREE.Mesh(pillarGeo, pillarMat);
            pillar.position.set(i, 1, j-2);
            pillar.receiveShadow = true;
            pillar.castShadow = true;
            scene.add(pillar);
        }
    }

    // --- 创建竖立靶子 ---
    const targets = [];
    const TARGET_COUNT = 10;
    
    function createStandingTarget() {
        const group = new THREE.Group();
        
        const base = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.15, 0.8), new THREE.MeshStandardMaterial({ color: 0x5d4a36, roughness: 0.8 }));
        base.position.y = 0.075;
        base.receiveShadow = true;
        base.castShadow = true;
        group.add(base);
        
        const pole = new THREE.Mesh(new THREE.BoxGeometry(0.2, 1.6, 0.2), new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.6, metalness: 0.2 }));
        pole.position.y = 0.95;
        pole.receiveShadow = true;
        pole.castShadow = true;
        group.add(pole);
        
        const boardMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.5 });
        const board = new THREE.Mesh(new THREE.BoxGeometry(1.8, 1.4, 0.1), boardMat);
        board.position.y = 1.8;
        board.receiveShadow = true;
        board.castShadow = true;
        group.add(board);
        
        const redRingMat = new THREE.MeshStandardMaterial({ color: 0xcc3333 });
        const ring1 = new THREE.Mesh(new THREE.CylinderGeometry(0.65, 0.65, 0.02, 32), redRingMat);
        ring1.rotation.x = Math.PI / 2;
        ring1.position.y = 1.8;
        ring1.position.z = 0.06;
        group.add(ring1);
        
        const whiteRingMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const ring2 = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.45, 0.02, 32), whiteRingMat);
        ring2.rotation.x = Math.PI / 2;
        ring2.position.y = 1.8;
        ring2.position.z = 0.07;
        group.add(ring2);
        
        const innerRed = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 0.02, 32), new THREE.MeshStandardMaterial({ color: 0xdd2222 }));
        innerRed.rotation.x = Math.PI / 2;
        innerRed.position.y = 1.8;
        innerRed.position.z = 0.08;
        group.add(innerRed);
        
        const centerSphere = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16), new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: new THREE.Color(0x331100) }));
        centerSphere.position.y = 1.8;
        centerSphere.position.z = 0.1;
        group.add(centerSphere);
        
        return group;
    }

    function respawnTarget(index) {
        const t = targets[index];
        const angle = (index / TARGET_COUNT) * Math.PI * 2 + 0.5;
        const radius = 5.5 + Math.random() * 2.5;
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius - 1;
        t.group.position.set(x, 0, z);
        t.group.rotation.y = Math.atan2(-x, -z) + 0.2;
        t.alive = true;
    }

    for (let i = 0; i < TARGET_COUNT; i++) {
        const group = createStandingTarget();
        scene.add(group);
        targets.push({ group, alive: true });
        respawnTarget(i);
    }

    // --- 游戏状态 ---
    let hitScore = 0;
    let swingScore = 0;
    let isAiming = false;
    const NORMAL_FOV = 60;
    const SCOPE_FOV = 25;
    
    let lastTouchX = 0, lastTouchY = 0;
    let touchVelocity = 0;
    const SWING_THRESHOLD = 12.0;
    
    const hitSpan = document.getElementById('hit-count');
    const swingSpan = document.getElementById('swing-count');
    const scopeLed = document.getElementById('scope-led');
    const swingFeedback = document.getElementById('swing-feedback');
    const velocityFill = document.getElementById('velocity-fill');
    const uiLayer = document.getElementById('ui-layer');
    
    // 语言 & UI
    let currentLang = 'zh';
    const langElements = document.querySelectorAll('[data-lang-en]');
    const startupOverlay = document.getElementById('startup-overlay');
    const langBtns = document.querySelectorAll('.lang-btn');
    const langToggleBtn = document.getElementById('lang-btn');
    const leaderboardToggle = document.getElementById('leaderboard-toggle');
    const leaderboardPanel = document.getElementById('leaderboard-panel');
    const closeLeaderboard = document.getElementById('close-leaderboard');
    const clearLeaderboardBtn = document.getElementById('clear-leaderboard');
    const leaderboardList = document.getElementById('leaderboard-list');
    
    // 积分榜数据 (存储甩狙数)
    let leaderboard = [];
    const STORAGE_KEY = 'swing_sniper_leaderboard';
    
    function loadLeaderboard() {
        try {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) leaderboard = JSON.parse(stored);
            else leaderboard = [];
        } catch(e) { leaderboard = []; }
        renderLeaderboard();
    }
    function saveLeaderboard() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(leaderboard));
    }
    function addScoreToLeaderboard(swing) {
        if (swing === 0) return;
        leaderboard.push({ score: swing, date: Date.now() });
        leaderboard.sort((a, b) => b.score - a.score);
        if (leaderboard.length > 5) leaderboard = leaderboard.slice(0, 5);
        saveLeaderboard();
        renderLeaderboard();
    }
    function clearLeaderboard() {
        leaderboard = [];
        saveLeaderboard();
        renderLeaderboard();
    }
    function renderLeaderboard() {
        leaderboardList.innerHTML = '';
        if (leaderboard.length === 0) {
            const emptyMsg = currentLang === 'zh' ? '暂无记录' : 'No records yet';
            leaderboardList.innerHTML = `<li class="empty-leaderboard">${emptyMsg}</li>`;
            return;
        }
        leaderboard.forEach((item, idx) => {
            const li = document.createElement('li');
            li.className = 'leaderboard-item';
            li.innerHTML = `<span class="rank">#${idx+1}</span><span class="score">${item.score} ⚡</span>`;
            leaderboardList.appendChild(li);
        });
    }
    
    function setLanguage(lang) {
        currentLang = lang;
        langElements.forEach(el => {
            const text = el.getAttribute(`data-lang-${lang}`) || el.getAttribute(`data-lang-en`);
            if (text) el.textContent = text;
        });
        document.querySelector('.startup-title').textContent = lang === 'zh' ? '🔭 甩狙模拟器' : '🔭 SWING SNIPER';
        document.querySelector('.startup-footer').textContent = lang === 'zh' ? '按住瞄准 · 松手射击 · 快速滑动触发甩狙' : 'Hold to aim · Release to fire · Swipe fast for swing bonus';
        langToggleBtn.textContent = lang === 'zh' ? '🌐 English' : '🌐 中文';
        leaderboardToggle.textContent = lang === 'zh' ? '🏆 积分榜' : '🏆 Leaderboard';
        renderLeaderboard(); // 更新空状态文字
    }
    
    langBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const lang = btn.getAttribute('data-lang');
            setLanguage(lang);
            startupOverlay.style.opacity = '0';
            setTimeout(() => startupOverlay.style.display = 'none', 500);
        });
    });
    langToggleBtn.addEventListener('click', () => setLanguage(currentLang === 'zh' ? 'en' : 'zh'));
    
    leaderboardToggle.addEventListener('click', () => {
        leaderboardPanel.classList.toggle('show');
    });
    closeLeaderboard.addEventListener('click', () => {
        leaderboardPanel.classList.remove('show');
    });
    clearLeaderboardBtn.addEventListener('click', clearLeaderboard);
    
    function updateUI() {
        hitSpan.textContent = hitScore;
        swingSpan.textContent = swingScore;
    }
    
    function showSwingEffect() {
        swingFeedback.style.opacity = '1';
        setTimeout(() => swingFeedback.style.opacity = '0', 300);
    }
    
    function shoot() {
        if (!isAiming) return;
        
        const raycaster = new THREE.Raycaster();
        const direction = new THREE.Vector3(0, 0, -1);
        direction.applyQuaternion(camera.quaternion);
        raycaster.set(camera.position, direction);
        
        const velocityFactor = Math.min(touchVelocity / 20, 2.0);
        const swingBonus = touchVelocity > SWING_THRESHOLD ? 0.8 + velocityFactor * 1.0 : 0;
        const baseRadius = isAiming ? 0.7 : 1.1;
        const hitRadius = baseRadius + swingBonus;
        
        let hitAny = false;
        let swingOccurred = false;
        const isSwing = touchVelocity > SWING_THRESHOLD;
        
        targets.forEach((t, idx) => {
            if (!t.alive) return;
            const targetPos = t.group.position.clone();
            targetPos.y += 1.8;
            
            const toTarget = new THREE.Vector3().subVectors(targetPos, camera.position);
            const proj = toTarget.dot(direction);
            if (proj < 0) return;
            
            const closestPoint = new THREE.Vector3().copy(direction).multiplyScalar(proj).add(camera.position);
            const distToCenter = closestPoint.distanceTo(targetPos);
            
            if (distToCenter < hitRadius) {
                t.alive = false;
                hitAny = true;
                hitScore++;
                if (isSwing) {
                    swingScore++;
                    swingOccurred = true;
                }
                respawnTarget(idx);
            }
        });
        
        if (hitAny) {
            updateUI();
            if (swingOccurred) showSwingEffect();
        }
    }
    
    // 记录本次成绩 (重置时调用)
    function recordCurrentScore() {
        if (swingScore > 0) {
            addScoreToLeaderboard(swingScore);
        }
    }
    
    function startAim(clientX, clientY) {
        isAiming = true;
        camera.fov = SCOPE_FOV;
        camera.updateProjectionMatrix();
        scopeLed.classList.add('active');
        uiLayer.classList.add('scope-active');
        lastTouchX = clientX;
        lastTouchY = clientY;
        touchVelocity = 0;
    }
    
    function endAim() {
        if (isAiming) shoot();
        isAiming = false;
        camera.fov = NORMAL_FOV;
        camera.updateProjectionMatrix();
        scopeLed.classList.remove('active');
        uiLayer.classList.remove('scope-active');
        touchVelocity = 0;
        velocityFill.style.width = '0%';
    }
    
    function handleMove(clientX, clientY) {
        if (!isAiming) return;
        const deltaX = clientX - lastTouchX;
        const deltaY = clientY - lastTouchY;
        const dist = Math.sqrt(deltaX*deltaX + deltaY*deltaY);
        touchVelocity = touchVelocity * 0.7 + dist * 0.3;
        
        const rotSpeed = 0.005;
        camera.rotation.y -= deltaX * rotSpeed;
        camera.rotation.x -= deltaY * rotSpeed;
        camera.rotation.x = Math.max(-0.9, Math.min(0.6, camera.rotation.x));
        
        lastTouchX = clientX;
        lastTouchY = clientY;
        
        const percent = Math.min(touchVelocity / 25, 1.0) * 100;
        velocityFill.style.width = percent + '%';
    }
    
    function onPointerDown(e) {
        e.preventDefault();
        const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        startAim(clientX, clientY);
    }
    
    function onPointerMove(e) {
        e.preventDefault();
        const clientX = e.clientX || (e.touches ? e.touches[0].clientX : lastTouchX);
        const clientY = e.clientY || (e.touches ? e.touches[0].clientY : lastTouchY);
        handleMove(clientX, clientY);
    }
    
    function onPointerUp(e) {
        e.preventDefault();
        endAim();
    }
    
    function resetRange() {
        // 记录当前成绩到积分榜
        recordCurrentScore();
        hitScore = 0;
        swingScore = 0;
        updateUI();
        targets.forEach((t, i) => {
            t.alive = true;
            respawnTarget(i);
        });
    }
    
    canvasEl.addEventListener('touchstart', onPointerDown, { passive: false });
    canvasEl.addEventListener('touchmove', onPointerMove, { passive: false });
    canvasEl.addEventListener('touchend', onPointerUp);
    canvasEl.addEventListener('touchcancel', onPointerUp);
    canvasEl.addEventListener('mousedown', onPointerDown);
    window.addEventListener('mousemove', (e) => { if (isAiming) handleMove(e.clientX, e.clientY); });
    window.addEventListener('mouseup', onPointerUp);
    document.getElementById('reset-btn').addEventListener('click', resetRange);
    canvasEl.addEventListener('contextmenu', e => e.preventDefault());
    
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    // 星星背景
    const starsGeo = new THREE.BufferGeometry();
    const starsCount = 600;
    const posArray = new Float32Array(starsCount * 3);
    for (let i = 0; i < starsCount * 3; i+=3) {
        posArray[i] = (Math.random() - 0.5) * 200;
        posArray[i+1] = (Math.random() - 0.5) * 100;
        posArray[i+2] = (Math.random() - 0.5) * 200;
    }
    starsGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    const starsMat = new THREE.PointsMaterial({color: 0xaaccff, size: 0.15});
    const stars = new THREE.Points(starsGeo, starsMat);
    scene.add(stars);
    
    function animate() {
        requestAnimationFrame(animate);
        stars.rotation.y += 0.0002;
        renderer.render(scene, camera);
    }
    animate();
    
    // 初始化
    setLanguage('zh');
    loadLeaderboard();
</script>
</body>
</html>
